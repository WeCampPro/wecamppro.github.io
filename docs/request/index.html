 <body>

  <a class="hd-skip-link" href="#hd-main">پرش به محتوای اصلی</a>
  <main id="hd-main" dir="rtl" class="hd-utility-page-container">
   <h1 class="hd-sr-only">درخواست اطلاعات</h1>
    <div class="hd-container hd-clearfix hd-checkout-layout">
     <div class="hd-checkout-main" data-hd-form-wrap>
      <form class="hd-form" action="https://api.web3forms.com/submit" method="POST">
       <input type="hidden" name="access_key" value="6540d8e6-186a-4cff-87b0-9e5c89f50b08">
       <div class="hd-form-block-header">
        <p class="hd-form-title">
         لطفا فرم زیر را تکمیل کنید.
        </p>
        <div>
         * الزامی
        </div>
       </div>
       <fieldset class="hd-form-block">
        <label class="hd-checkout-label" for="request-name">
         نام و نام خانوادگی
         <span class="hd-required">
          *
         </span>
        </label>
        <input class="hd-input" id="request-name" name="name" autocomplete="name" required="" type="text"/>
        <div class="hd-form-row">
         <div class="hd-form-col">
          <label class="hd-checkout-label" for="request-phone">
         موبایل
           <span class="hd-required">
            *
           </span>
          </label>
          <input dir="ltr" class="hd-input" id="request-phone" name="phone" autocomplete="tel" inputmode="tel" required="" type="tel" pattern="[0-9۰-۹]{10,11}" title="لطفا با فرمت ۰۹۱۲۳۴۵۶۷۸۹ درج کنید"/>
         </div>
         <div class="hd-form-col">
          <label class="hd-checkout-label" for="request-email">
         ایمیل
           <span class="hd-required">
            *
           </span>
          </label>
        <input dir="ltr" class="hd-input" id="request-email" name="email" autocomplete="email" inputmode="email" spellcheck="false" required="" type="email"/>
         </div>
        </div>
        <div class="hd-form-row">
         <div class="hd-form-col">
          <label class="hd-checkout-label" for="request-camp">
         انتخاب موضوع آموزشی
          </label>
          <select class="hd-input hd-select" id="request-camp" name="Which Camp" autocomplete="off">
             <option value="---">
              ---
             </option>
             <option value="AI">
              هوش مصنوعی
             </option>
             <option value="Design">
              محصول
             </option>
             <option value="Marketing">
              مارکتینگ
             </option>
             <option value="DevOps&Cloud">
              دواپس / کلود
             </option>
             <option value="Programing">
              توسعه نرم‌افزار
             </option>
             <option value="Other">
              سایر
             </option>
         </select>
         </div>
         <div class="hd-form-col">
          <label class="hd-checkout-label" for="request-age-range">
         بازه سنی شما
          </label>
          <select class="hd-input hd-select" id="request-age-range" name="age_range" autocomplete="off">
             <option value="---">
              ---
             </option>
             <option value="-18">
              کمتر از ۱۸
             </option>
             <option value="18-24">
              ۱۸ تا ۲۴
             </option>
             <option value="25-34">
              ۲۵ تا ۳۴
             </option>
             <option value="35-44">
              ۳۵ تا ۴۴
             </option>
             <option value="45+">
              ۴۵ و بالاتر
             </option>
          </select>
         </div>
        </div>
        <label class="hd-checkout-label" for="request-questions">
         می‌توانید سوال(های) خود را در اینجا بنویسید.
        </label>
        <textarea class="hd-input hd-textarea" id="request-questions" name="which product" autocomplete="off" minlength="20"></textarea>
        <label class="hd-checkout-label" for="request-resume">
         📑 رزومه
         <p>
          <small>
           اگر پروفایل لینکدین یا رزومه آماده (آپلود شده روی گوگل‌درایو) دارید، لینک آن را درج کنید.
          </small>
         </p>
        </label>
        <input dir="ltr" class="hd-input" id="request-resume" name="resume" autocomplete="url" inputmode="url" spellcheck="false" type="url"/>
       </fieldset>

       <input type="hidden" name="subject" id="var1" value="مشاوره درخواست کرد">
       <input type="hidden" name="redirect" id="var2" value="https://wecamp.pro/success">
       
       
       <div class="hd-form-row">
        <div class="hd-form-col">
         <button
           class="hd-button hd-button-secondary hd-button-full"
           type="submit"
           data-request-subject="مشاوره درخواست کرد"
           data-request-redirect="https://wecamp.pro/success">
         <span style="display: flex; align-items: center;">
          <img height="24" width="24" src="/img/icons/about-slider-1.svg" alt="" />
          <span style="margin-right: 8px;">ارسال فرم</span>
        </span>
         </button>
       </div>
       </div>
      </form>
      <div class="hd-form-success" aria-live="polite" aria-hidden="true">
       فرم با موفقیت ارسال شد. به‌زودی با شما تماس می‌گیریم.
      </div>
      <div class="hd-form-error" aria-live="polite" aria-hidden="true">
       خطایی رخ داد. لطفاً دوباره تلاش کنید.
      </div>
     </div>
    </div>
